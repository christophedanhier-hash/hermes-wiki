site_name: Wiki LEO — Portail Écosystème Hermès
site_description: Portail central de l'écosystème Hermes Agent — dashboards, wikis, bots, bureaux virtuels, infrastructure
site_author: Christophe (Tofdan) & LEO
repo_url: https://github.com/christophedanhier-hash/hermes-wiki
edit_uri: edit/main/docs/
copyright: "&copy; 2026 Christophe Danhier — Propulsé par Hermes Agent"

theme:
  name: material
  language: fr
  palette:
    primary: indigo
    accent: deep purple
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/christophedanhier-hash
    - icon: fontawesome/brands/telegram
      link: https://t.me/tofdan

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

nav:
  - 🏠 Portail: index.md
  - 🛡️ Hermes Agent:
      - Présentation: hermes/index.md
      - Installation:
        - Linux: hermes/installation/linux.md
        - Windows: hermes/installation/windows.md
      - Configuration:
        - Providers LLM: hermes/configuration/providers.md
        - Profils: hermes/configuration/profiles.md
      - Utilisation:
        - Usage quotidien: hermes/utilisation/quotidien.md
        - Crons & planification: hermes/utilisation/crons.md
        - Dashboards: hermes/utilisation/dashboards.md
      - 🏗️ Architecture: hermes/architecture.md
      - 📋 Changelog: hermes/changelog.md
      - Aller plus loin:
        - Dépannage: hermes/aller-plus-loin/troubleshooting.md
        - Références: hermes/aller-plus-loin/references.md
      - 🏠 Exemple LEO: hermes/leo-architecture.md
      - 📋 État des lieux: hermes/etat-des-lieux.md
