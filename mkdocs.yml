site_name: Wiki LEO — Portail LEO
site_description: Portail central de l'écosystème Hermes Agent — dashboards, wikis, bots, bureaux virtuels, infrastructure
site_author: Christophe (Tofdan) & LEO
repo_url: https://github.com/christophedanhier-hash/hermes-wiki
edit_uri: edit/main/docs/
copyright: "&copy; 2026 Christophe Danhier — Propulsé par Hermes Agent"

theme:
  name: material
  language: fr
  palette:
    primary: indigo
    accent: deep purple
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/christophedanhier-hash
    - icon: fontawesome/brands/telegram
      link: https://t.me/tofdan

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - assets/mermaid-init.js

nav:
  - 🏠 Accueil: index.md
  - 🛡️ Hermes Agent:
      - Présentation: hermes/index.md
      - 🏗️ Architecture & Communication: hermes/architecture-communication.md
      - 💻 Installation:
        - Linux: hermes/installation/linux.md
        - Windows: hermes/installation/windows.md
      - Configuration:
        - Providers LLM: hermes/configuration/providers.md
        - Profils: hermes/configuration/profiles.md
      - Utilisation:
        - Usage quotidien: hermes/utilisation/quotidien.md
        - Crons & planification: hermes/utilisation/crons.md
        - Dashboards: hermes/utilisation/dashboards.md
        - 🌐 Interface Web: hermes/interface-web.md
        - 💾 Backup & Recovery: hermes/utilisation/backup-recovery.md
      - 📚 Catalogue des Skills: hermes/utilisation/skills-catalogue.md
      - 📋 Changelog: hermes/changelog.md
      - Aller plus loin:
        - Dépannage: hermes/aller-plus-loin/troubleshooting.md
        - Références: hermes/aller-plus-loin/references.md
      - 🔧 Services LEO:
        - n8n — Automatisation: hermes/services/n8n.md
        - 📊 Dashboard n8n: hermes/dashboards/n8n.md
        - 🎵 Spotify: hermes/services/spotify.md
      - 📋 État des lieux: hermes/etat-des-lieux.md

  - 🌐 Portail LEO:
    - 🏛️ BAVI LEO: https://christophedanhier-hash.github.io/BAVI_LEO/
    - 🧭 Voyages: https://christophedanhier-hash.github.io/voyages-wiki/
    - 🔭 Wiki OCA: https://christophedanhier-hash.github.io/wiki-oca/
